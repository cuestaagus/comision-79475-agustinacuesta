<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--CSS propio-->
    <link rel="stylesheet" href="../css/style.css">
    <title>La mar en coche</title>
</head>
<body>
    <header>
        <h1>LA MAR EN COCHE</h1>
        <h2>Lettering & ilustración</h2>
    </header>
    <main>
        <nav class="navbar navbar-expand-md navbar-custom">
            <div class="container-fluid justify-content-center">

                <!-- botón hamburguesa -->
                <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuPrincipal"
                    aria-controls="menuPrincipal"
                    aria-expanded="false"
                    aria-label="Mostrar navegación">

                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- menú -->
                <div class="collapse navbar-collapse justify-content-center" id="menuPrincipal">
                    <ul class="navbar-nav text-center">

                        <li class="nav__item">
                            <a class="nav-link" href="../index.html">Inicio</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav-link" href="servicios.html">Servicios</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav-link" href="contacto.html">Contacto</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="galeria.html">Galería</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    

        <!--formulario de contacto-->
        <section class="contacto">
        <form action="mensajeenviado.html" method="get">
        
        <label for="">Nombre</label><br>
        <input type="text" name="Nombre" id="nombre" placeholder="Escribe tu nombre" required><br><br>
        
        <label for="">Email</label><br>
        <input type="email" name="email" id="" placeholder="Escribe tu email" required><br><br>
        
        <label for="">Cuál servicio te interesa?</label><br>
        
        <input type="radio" name= "servicio" id="servicio-lettering" value="lettering" required>
        <label for="servicio-lettering">Lettering personalizado</label><br>
        
        <input type="radio" name="servicio" id="servicio-workshops" value="workshops">
        <label for="servicio-workshops">Workshops y clases</label><br>
        
        <input type="radio" name="servicio" id="servicio-papeleria" value="papeleria">
        <label for="servicio-papeleria">Papelería y cartelería</label><br><br>
        
        <label for="mensaje">Mensaje</label><br>
        <input type="text" name="mensaje" id="mensaje" placeholder="Escribe aqui tu mensaje"><br><br>
        
        <input type="submit" value="Enviar">
        </form>
        </section>
    </main>
        <footer>
            <p>© 2026 La mar en coche · Lettering & ilustración · Todos los derechos reservados</p>
        </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
